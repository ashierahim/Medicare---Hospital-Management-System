{% extends "admin/base.html" %}
{% load static %}

{% block title %}{% if subtitle %}{{ subtitle }} | {% endif %}{{ title }} | Medicare Control Center{% endblock %}

{% block branding %}
<div id="site-name" style="display: flex; align-items: center; gap: 8px;">
    <a href="{% url 'admin:index' %}" style="display: flex; align-items: center; gap: 8px; font-weight: 800; letter-spacing: -0.5px; font-size: 1.35rem; color: #fff;">
        <i class="bi bi-heart-pulse-fill" style="color: #67e8f9; animation: heartBeat 2s infinite ease-in-out;"></i>
        Medicare Portal
    </a>
</div>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>
    /* Pulse Animation */
    @keyframes heartBeat {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.15); }
    }

    /* CSS variables theme injection to match Outfit typography and Indigo/Cyan theme */
    :root, [data-theme="light"] {
        --primary: #4f46e5 !important;
        --primary-fg: #ffffff !important;
        --secondary: #06b6d4 !important;
        --accent: #10b981 !important;
        --body-bg: #f8fafc !important;
        --body-fg: #1e293b !important;
        --body-quiet-color: #64748b !important;
        --border-color: rgba(226, 232, 240, 0.8) !important;
        --link-color: #4f46e5 !important;
        --link-hover-color: #3730a3 !important;
        --link-selected-color: #4f46e5 !important;
        --breadcrumbs-bg: #4f46e5 !important;
        --breadcrumbs-link-fg: #ffffff !important;
        --breadcrumbs-fg: rgba(255, 255, 255, 0.8) !important;
        --header-bg: #4f46e5 !important;
        --header-link-color: #ffffff !important;
        --header-color: #67e8f9 !important;
        --button-bg: #4f46e5 !important;
        --button-hover-bg: #3730a3 !important;
        --button-fg: #ffffff !important;
        --default-button-bg: #06b6d4 !important;
        --default-button-hover-bg: #0891b2 !important;
        --default-button-fg: #ffffff !important;
        --delete-button-bg: #ef4444 !important;
        --delete-button-hover-bg: #dc2626 !important;
    }

    [data-theme="dark"] {
        --primary: #6366f1 !important;
        --primary-fg: #ffffff !important;
        --secondary: #0891b2 !important;
        --accent: #10b981 !important;
        --body-bg: #0f172a !important;
        --body-fg: #f8fafc !important;
        --body-quiet-color: #94a3b8 !important;
        --border-color: rgba(51, 65, 85, 0.8) !important;
        --link-color: #818cf8 !important;
        --link-hover-color: #a5b4fc !important;
        --link-selected-color: #818cf8 !important;
        --breadcrumbs-bg: #1e1b4b !important;
        --breadcrumbs-link-fg: #ffffff !important;
        --breadcrumbs-fg: rgba(255, 255, 255, 0.8) !important;
        --header-bg: #1e1b4b !important;
        --header-link-color: #ffffff !important;
        --header-color: #67e8f9 !important;
        --button-bg: #6366f1 !important;
        --button-hover-bg: #4f46e5 !important;
        --button-fg: #ffffff !important;
        --default-button-bg: #0891b2 !important;
        --default-button-hover-bg: #0e7490 !important;
        --default-button-fg: #ffffff !important;
        --delete-button-bg: #ef4444 !important;
        --delete-button-hover-bg: #dc2626 !important;
    }

    /* Apply Outfit font across admin elements */
    body, input, select, textarea, button, .module h2, .module caption, #breadcrumbs {
        font-family: 'Outfit', sans-serif !important;
    }

    #header {
        background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%) !important;
        padding: 15px 40px !important;
        box-shadow: 0 4px 15px rgba(79, 70, 229, 0.15) !important;
        border-bottom: none !important;
    }

    /* Rounded cards and clean modules */
    .module, .dashboard .module {
        background: #ffffff !important;
        border: 1px solid rgba(226, 232, 240, 0.8) !important;
        border-radius: 16px !important;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02) !important;
        overflow: hidden !important;
        margin-bottom: 25px !important;
    }

    [data-theme="dark"] .module, [data-theme="dark"] .dashboard .module {
        background: #1e293b !important;
        border-color: rgba(51, 65, 85, 0.8) !important;
    }

    .module h2, .module caption {
        background: rgba(79, 70, 229, 0.05) !important;
        color: #4f46e5 !important;
        font-weight: 700 !important;
        text-transform: uppercase;
        font-size: 0.82rem !important;
        letter-spacing: 0.5px !important;
        padding: 14px 20px !important;
    }

    [data-theme="dark"] .module h2, [data-theme="dark"] .module caption {
        background: rgba(99, 102, 241, 0.1) !important;
        color: #a5b4fc !important;
    }

    /* Table styling in listing pages */
    #changelist-form table {
        border-radius: 8px !important;
        overflow: hidden !important;
    }

    #changelist-form th, .results table th {
        background: rgba(79, 70, 229, 0.03) !important;
        font-weight: 700 !important;
        color: var(--body-fg) !important;
        text-transform: uppercase;
        font-size: 0.78rem !important;
        letter-spacing: 0.5px !important;
        padding: 12px 14px !important;
    }

    .results table tbody tr {
        transition: all 0.2s ease !important;
    }

    .results table tbody tr:hover {
        background: rgba(79, 70, 229, 0.02) !important;
    }

    /* Buttons */
    .submit-row input, .submit-row a, .button, input[type=submit] {
        border-radius: 9999px !important;
        padding: 10px 20px !important;
        font-weight: 600 !important;
        letter-spacing: 0.2px !important;
        transition: all 0.2s ease !important;
        border: none !important;
    }

    /* Text Inputs focus styling */
    input[type=text], input[type=password], input[type=email], input[type=number], input[type=tel], input[type=url], select, textarea {
        border-radius: 8px !important;
        border: 1.5px solid var(--border-color) !important;
        padding: 8px 12px !important;
        transition: all 0.2s ease !important;
        background: rgba(255, 255, 255, 0.9) !important;
    }

    input[type=text]:focus, input[type=password]:focus, input[type=email]:focus, select:focus, textarea:focus {
        border-color: #4f46e5 !important;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15) !important;
        outline: none !important;
    }

    /* Sidebar list styling */
    #content-related {
        background: #ffffff !important;
        border: 1px solid rgba(226, 232, 240, 0.8) !important;
        border-radius: 16px !important;
        padding: 20px !important;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02) !important;
    }

    [data-theme="dark"] #content-related {
        background: #1e293b !important;
        border-color: rgba(51, 65, 85, 0.8) !important;
    }

    /* Action bar styles */
    .actions {
        background: #ffffff !important;
        border: 1px solid rgba(226, 232, 240, 0.8) !important;
        border-radius: 12px !important;
        padding: 12px !important;
        margin-bottom: 20px !important;
    }

    [data-theme="dark"] .actions {
        background: #1e293b !important;
        border-color: rgba(51, 65, 85, 0.8) !important;
    }
</style>
{% endblock %}
